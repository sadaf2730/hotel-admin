services:
  - type: web
    name: hotel-admin
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "python prestart.py && gunicorn admin_app:app"
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: DATABASE_PATH
        value: /tmp/hotel_booking_system.db
